name: Generate Stat Cards

on:
  schedule:
    - cron: "17 6 * * *"   # daily, ~06:17 UTC
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate_stats.py"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

concurrency:
  group: stat-cards
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/generate_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --staged --quiet; then
            echo "No stat changes today."
          else
            git commit -m "chore: refresh stat cards [skip ci]"
            # main may have moved on while we were generating; rebase before pushing
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push attempt $attempt failed; retrying..."
              sleep 5
            done
            echo "::error::could not push stat cards after 3 attempts"
            exit 1
          fi
